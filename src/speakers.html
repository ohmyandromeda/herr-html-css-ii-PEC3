<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./assets/styles/main.css" />
    <title>Artusania - Ponentes</title>
  </head>
  <body
    class="bg-brand-bg font-sans antialiased text-brand-primary min-h-screen flex flex-col"
  >
    <main class="flex-grow">
      <section class="max-w-6xl mx-auto px-6 py-16">
        <h2
          class="text-4xl font-black text-brand-primary uppercase tracking-wider mb-12 mt-8 inline-block"
        >
          Ponentes de las Jornadas
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
          <article class="flex flex-col bg-brand-secondary/10">
            <div class="w-full h-72 overflow-hidden">
              <img
                src="./assets/images/tatsu-ceramica.jpeg"
                alt="Tatsu Cerámica"
                class="w-full h-full object-cover"
              />
            </div>
            <div class="flex flex-col flex-grow p-6">
              <span
                class="text-xs font-bold text-brand-secondary uppercase tracking-widest mb-1"
              >
                Rakú jewelry
              </span>
              <h3 class="text-2xl font-bold text-brand-primary mb-2">
                Tanya Sush
              </h3>
              <p
                class="text-sm text-brand-primary/80 leading-relaxed mb-6 flex-grow"
              >
                Especialista en Cerámica artesanal
              </p>
              <div>
                <a
                  href="https://www.instagram.com/tatsu_ceramica/"
                  class="inline-flex items-center gap-2 bg-brand-primary hover:bg-brand-primary/80 text-white text-sm font-medium px-4 py-2.5 rounded transition-colors w-full justify-center shadow-sm"
                  target="_blank"
                  rel="noopener"
                >
                  <i class="fa-brands fa-instagram text-base"></i> Instagram
                </a>
              </div>
            </div>
          </article>

          <article class="flex flex-col bg-brand-secondary/10">
            <div class="w-full h-72 overflow-hidden">
              <img
                src="./assets/images/bico.png"
                alt="BICO joyería"
                class="w-full h-full object-cover"
              />
            </div>
            <div class="flex flex-col flex-grow p-6">
              <span
                class="text-xs font-bold text-brand-secondary uppercase tracking-widest mb-1"
              >
                BICO joyería
              </span>
              <h3 class="text-2xl font-bold text-brand-primary mb-2">
                Ale e Isa
              </h3>
              <p>Emprendedoras de marca de joyería cerámica.</p>
              <div>
                <a
                  href="https://www.instagram.com/bico_________/"
                  class="inline-flex items-center gap-2 bg-brand-primary hover:bg-brand-primary/80 text-white text-sm font-medium px-3 py-2.5 rounded transition-colors justify-center shadow-sm"
                  target="_blank"
                  rel="noopener"
                >
                  <i class="fa-brands fa-instagram text-base"></i> Instagram
                </a>
                <a
                  href="https://bicoshop.es/"
                  class="inline-flex items-center gap-2 bg-brand-secondary text-brand-primary hover:bg-brand-secondary/80 text-sm font-medium px-3 py-2.5 rounded transition-all justify-center border border-brand-secondary shadow-sm"
                  target="_blank"
                  rel="noopener"
                >
                  <i class="fa-solid fa-globe text-base"></i> Web
                </a>
              </div>
            </div>
          </article>

          <article class="flex flex-col bg-brand-secondary/10">
            <div class="w-full h-72 overflow-hidden">
              <img
                src="./assets/images/andromeda.jpeg"
                alt="Andromeda"
                class="w-full h-full object-cover"
              />
            </div>
            <div class="flex flex-col flex-grow p-6">
              <span
                class="text-xs font-bold text-brand-secondary uppercase tracking-widest mb-1"
              >
                Oh my andromeda
              </span>
              <h3 class="text-2xl font-bold text-brand-primary mb-2">
                Andrea Esteve
              </h3>
              <p
                class="text-sm text-brand-primary/80 leading-relaxed mb-6 flex-grow"
              >
                Ilustradora y retratista
              </p>
              <div>
                <a
                  href="https://www.instagram.com/ohmyandromed.art/"
                  class="inline-flex items-center gap-2 bg-brand-primary hover:bg-brand-primary/80 text-white text-sm font-medium px-4 py-2.5 rounded transition-colors w-full justify-center shadow-sm"
                  target="_blank"
                  rel="noopener"
                >
                  <i class="fa-brands fa-instagram text-base"></i> Instagram
                </a>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <include src="./views/footer.html"></include>
    <script type="module" src="./assets/scripts/main.js"></script>
  </body>
</html>
